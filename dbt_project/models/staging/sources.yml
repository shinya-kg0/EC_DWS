version: 2

sources:
  - name: raw
    database: ec_dwh
    schema: raw
    tables:
      - name: fact_orders
        columns:
          - name: '"order_id"'
            tests:
              - not_null
          - name: '"order_status"'
            tests:
              - not_null
      - name: reviews_for_tttc
        columns:
          - name: '"review_id"'
            tests:
              - not_null
      - name: dim_products
        columns:
          - name: '"order_id"'
            tests:
              - not_null

models:
  - name: fct_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: order_status
        tests:
          - not_null

  - name: dim_customers
    columns:
      - name: customer_unique_id
        tests:
          - not_null

  - name: agg_daily_sales
    columns:
      - name: order_date
        tests:
          - not_null
          - unique